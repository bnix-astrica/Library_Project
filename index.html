<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Project</title>
  </head>
  <body>
    <main
      style="
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding-top: 2rem;
      "
    >
      <h1>Library Project</h1>

      <div id="inputs" style="margin-bottom: 2rem; display: flex; gap: 10px; align-items: center;">
        <label for="title">Title:</label>
        <input type="text" id="titleInput" placeholder="Enter Title" />

        <label for="author">Author:</label>
        <input type="text" id="authorInput" placeholder="Enter Author" />

        <label for="read">Read?</label>
        <input type="checkbox" id="readCheckbox" />

        <button id="addBookBtn">Add Book</button>
      </div>

      <div id="library">
        <table id="table" style="min-width: 680px; margin: 2rem; border-collapse: collapse;" border="1">
          <thead>
            <tr>
              <th>Title</th>
              <th>Author</th>
              <th>Read</th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            </tbody>
        </table>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
